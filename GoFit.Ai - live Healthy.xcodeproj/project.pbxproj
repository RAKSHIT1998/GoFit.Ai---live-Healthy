			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "#!/bin/bash\nset -e\n\nif [ \"${CONFIGURATION}\" == \"Release\" ]; then\n  echo \"🔎 [dSYM Copy Script] Starting expanded search for Google framework dSYMs...\"\n  echo \"📁 DWARF_DSYM_FOLDER_PATH: ${DWARF_DSYM_FOLDER_PATH}\"\n  echo \"📁 BUILT_PRODUCTS_DIR: ${BUILT_PRODUCTS_DIR}\"\n  echo \"📁 BUILD_DIR: ${BUILD_DIR}\"\n  echo \"📁 DERIVED_DATA_DIR: ${DERIVED_DATA_DIR:-}\"\n  echo \"📁 HOME: ${HOME}\"\n\n  # Aggressive search roots (covers DerivedData, SwiftPM caches, archives, and build intermediates)\n  SEARCH_ROOTS=(\n    \"${BUILT_PRODUCTS_DIR}\"\n    \"${BUILD_DIR}\"\n    \"${BUILD_DIR}/SourcePackages\"\n    \"${BUILD_DIR}/../SourcePackages\"\n    \"${DERIVED_DATA_DIR:-}/SourcePackages\"\n    \"${DERIVED_DATA_DIR:-}/Build/Products\"\n    \"${HOME}/Library/Developer/Xcode/DerivedData\"\n    \"${HOME}/Library/Caches/org.swift.swiftpm\"\n    \"${HOME}/.swiftpm\"\n    \"${BUILD_DIR}/.build\"\n    \"${BUILD_DIR}/Intermediates.noindex\"\n    \"${HOME}/Library/Developer/Xcode/Archives\"\n  )\n\n  for FRAMEWORK_NAME in \"GoogleMobileAds\" \"UserMessagingPlatform\"; do\n    echo \"\\n🔍 Searching for ${FRAMEWORK_NAME} dSYM packages...\"\n    FOUND=0\n\n    for ROOT in \"${SEARCH_ROOTS[@]}\"; do\n      [ -n \"${ROOT}\" ] || continue\n      [ -d \"${ROOT}\" ] || continue\n      echo \"  Checking: ${ROOT}\"\n\n      # 1) Exact .framework.dSYM\n      FOUND_PATH=$(find \"${ROOT}\" -type d -name \"${FRAMEWORK_NAME}.framework.dSYM\" 2>/dev/null | head -n 1 || true)\n      if [ -n \"${FOUND_PATH}\" ]; then\n        echo \"  ✅ Found framework dSYM at: ${FOUND_PATH}\"\n        cp -r \"${FOUND_PATH}\" \"${DWARF_DSYM_FOLDER_PATH}/\"\n        FOUND=1; break\n      fi\n\n      # 2) Any dSYM containing the framework name (covers slightly renamed bundles)\n      FOUND_PATH=$(find \"${ROOT}\" -type d -name \"*${FRAMEWORK_NAME}*.dSYM\" 2>/dev/null | head -n 1 || true)\n      if [ -n \"${FOUND_PATH}\" ]; then\n        echo \"  ✅ Found named dSYM at: ${FOUND_PATH}\"\n        cp -r \"${FOUND_PATH}\" \"${DWARF_DSYM_FOLDER_PATH}/\"\n        FOUND=1; break\n      fi\n\n      # 3) Search inside .xcframework directories for embedded dSYMs\n      XC_DSYM=$(find \"${ROOT}\" -type d -name \"*.xcframework\" -print0 2>/dev/null | xargs -0 -I {} find {} -type d -name \"*.dSYM\" -print 2>/dev/null | grep -i \"${FRAMEWORK_NAME}\" | head -n 1 || true)\n      if [ -n \"${XC_DSYM}\" ]; then\n        echo \"  ✅ Found dSYM inside xcframework at: ${XC_DSYM}\"\n        cp -r \"${XC_DSYM}\" \"${DWARF_DSYM_FOLDER_PATH}/\"\n        FOUND=1; break\n      fi\n\n      # 4) Fallback: any dSYM in the root (useful for host-level caches)\n      FOUND_PATH=$(find \"${ROOT}\" -type d -name \"*.dSYM\" 2>/dev/null | head -n 1 || true)\n      if [ -n \"${FOUND_PATH}\" ]; then\n        echo \"  ⚠️ Found unrelated dSYM (copying to archive): ${FOUND_PATH}\"\n        cp -r \"${FOUND_PATH}\" \"${DWARF_DSYM_FOLDER_PATH}/\"\n        FOUND=1; break\n      fi\n    done\n\n    if [ ${FOUND} -eq 0 ]; then\n      echo \"  ⚠️ ${FRAMEWORK_NAME} dSYM not found (may be normal for SPM binary packages).\"\n    fi\n  done\n\n  echo \"\\n✅ dSYM copy phase completed\"\nfi\n";
		};
